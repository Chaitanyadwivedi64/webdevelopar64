<html> <head> <title>Light ON / OFF bulb</title> <style> body { text-align: center; font-family: Arial; background-color: #f2f2f2; } img { width: 200px; margin: 20px; } button { padding: 10px 20px; font-size: 16px; margin: 10px; cursor: pointer; } </style> </head> <body> <h2> 💡 Light ON/ OFF bulb </h2> <img id="bulb" src="https://www.w3schools.com/js/pic_bulbon.gif"> <br> <button onclick="turnOn()"> ON </button> <button onclick="turnOff()"> OFF </button> <script> function turnOn() { document.getElementById("bulb").src = "https://www.w3schools.com/js/pic_bulbon.gif"; } function turnOff() { document.getElementById("bulb").src = "https://www.w3schools.com/js/pic_bulboff.gif"; } </script> </body> </html>
